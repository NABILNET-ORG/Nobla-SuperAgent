services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nobla:nobla@postgres:5432/nobla
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env file}
      - DAILY_BUDGET=${DAILY_BUDGET:-5.0}
      - MONTHLY_BUDGET=${MONTHLY_BUDGET:-50.0}
      - SESSION_BUDGET=${SESSION_BUDGET:-1.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nobla
      POSTGRES_PASSWORD: nobla
      POSTGRES_DB: nobla
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nobla"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-change-me}
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped

volumes:
  pgdata:
