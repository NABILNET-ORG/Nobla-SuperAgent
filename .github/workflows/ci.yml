name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: ruff check nobla/

      - name: Unit tests
        working-directory: backend
        run: pytest tests/ -v --cov=nobla --ignore=tests/integration -x

  flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test --coverage

      - name: Build web
        working-directory: app
        run: flutter build web

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nobla
          POSTGRES_PASSWORD: nobla
          POSTGRES_DB: nobla
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nobla"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Start backend
        working-directory: backend
        run: |
          uvicorn nobla.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
        env:
          DATABASE_URL: postgresql+asyncpg://nobla:nobla@localhost:5432/nobla
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret

      - name: Run integration tests
        working-directory: backend
        run: pytest tests/integration/ -m integration -v
        env:
          BACKEND_WS_URL: ws://localhost:8000/ws
